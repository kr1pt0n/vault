<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>VAULT</title>
    <style>
        :root { --bg: #09090b; --panel: #18181b; --accent: #3b82f6; --danger: #ef4444; --text: #e4e4e7; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; height: 100vh; margin: 0; overflow: hidden; }
        
        /* PANTALLA DE AUTENTICACIÓN (BLOQUEO) */
        #loginView { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #09090b; display: flex; justify-content: center; align-items: center; z-index: 5000; }
        .login-card { background: var(--panel); border: 1px solid #27272a; padding: 40px; border-radius: 12px; width: 340px; box-shadow: 0 20px 40px rgba(0,0,0,0.7); text-align: center; }
        
        header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 0 25px; 
            height: 65px; 
            border-bottom: 1px solid #27272a; 
            background: #0c0c0e; 
            box-sizing: border-box;
        }
        
        .header-left-group {
            display: flex;
            align-items: center; 
            height: 100%;
        }

        #tabs { 
            display: flex; 
            gap: 8px; 
            align-items: center; 
            margin-left: 210px; 
        }

        button { 
            cursor: pointer; 
            border: none; 
            padding: 0 14px; 
            border-radius: 6px; 
            background: #27272a; 
            color: #a1a1aa; 
            font-weight: 600; 
            font-size: 13px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            height: 34px; 
            box-sizing: border-box;
            transition: 0.2s; 
            line-height: 1; 
        }
        button:hover { background: #3f3f46; color: white; }
        button.active { background: var(--accent); color: white; }
        
        .btn-create { 
            background: var(--danger); 
            color: white; 
            margin-left: 200px; 
        }
        .btn-create:hover { background: #dc2626; }

        .switch-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .switch-label {
            font-size: 13px;
            font-weight: 600;
            color: #a1a1aa;
            user-select: none;
            transition: 0.2s;
        }
        .switch {
            position: relative;
            display: inline-block;
            width: 46px;
            height: 24px;
        }
        .switch input { 
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #27272a;
            transition: .3s ease;
            border-radius: 24px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .3s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 50%;
        }
        input:checked + .slider {
            background-color: #7c3aed; 
        }
        input:checked + .slider:before {
            transform: translateX(22px);
        }

        main { display: flex; flex: 1; overflow: hidden; }
        #sidebar { width: 320px; border-right: 1px solid #27272a; display: flex; flex-direction: column; padding: 15px; background: #0c0c0e; }
        
        #searchBox { width: 100%; padding: 12px; background: #18181b; border: 1px solid #27272a; color: white; border-radius: 8px; margin-bottom: 15px; outline: none; box-sizing: border-box; }
        #searchBox:focus { border-color: var(--accent); }

        #cmdList { overflow-y: auto; flex: 1; }
        .cmd-item { padding: 14px; border-radius: 8px; cursor: pointer; border: 1px solid transparent; margin-bottom: 8px; background: #18181b; transition: 0.2s; }
        .cmd-item:hover { background: #27272a; }
        .cmd-item.selected { border-color: var(--accent); background: #1e1e2e; }

        .content { flex: 1; padding: 30px; overflow-y: auto; display: flex; flex-direction: column; position: relative; }
        
        .code-box { background: #000; padding: 25px; border-radius: 10px; border: 2px solid #27272a; color: #34d399; font-family: 'Consolas', monospace; transition: border-color 0.2s ease; line-height: 1.5; white-space: pre-wrap; font-size: 15px; word-break: break-all; cursor: text; user-select: text; }
        .code-box:focus { border-color: #34d399; outline: none; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(4px); }
        .modal-content { background: var(--panel); width: 800px; max-width: 90%; height: 600px; border-radius: 12px; border: 1px solid #3f3f46; display: flex; flex-direction: column; padding: 25px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .modal-header h3 { margin: 0; font-size: 24px; color: white; }
        input, select, textarea { width: 100%; background: #09090b; border: 1px solid #27272a; color: white; padding: 12px; margin-bottom: 15px; border-radius: 6px; font-size: 14px; box-sizing: border-box; }
        textarea { flex: 1; resize: none; font-family: monospace; font-size: 14px; border-color: #3f3f46; }
        .modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 15px; }
        .btn-cancel { background: #3f3f46; color: white; }
        .btn-save { background: var(--accent); color: white; padding-left: 30px; padding-right: 30px; }
    </style>
</head>
<body>

    <div id="loginView">
        <div class="login-card">
            <h2 style="color: white; margin-top:0; letter-spacing: 2px;">VAULT AUTH</h2>
            <p style="color: #71717a; font-size: 13px; margin-bottom: 25px;">Introduce credenciales operativas</p>
            <form id="loginForm">
                <input type="text" id="loginUser" placeholder="Usuario" required autocomplete="off">
                <input type="password" id="loginPass" placeholder="Contraseña" required>
                <button type="submit" style="background: var(--accent); color:white; width: 100%; height: 42px; margin-top: 10px;">Acceder al Sistema</button>
            </form>
            <p id="loginError" style="color: var(--danger); font-size: 13px; margin-top: 15px; display: none;">Credenciales Incorrectas</p>
        </div>
    </div>

    <header>
        <div class="header-left-group">
            <div style="display: flex; flex-direction: column; justify-content: center;">
                <h2 style="margin:0; color:white; letter-spacing:1px; line-height: 1;">VAULT</h2>
                <div style="font-size:11px; color:#777; margin-top: 3px; line-height: 1;">Offensive Security Notes</div>
            </div>
            
            <div id="tabs"></div>
            
            <button onclick="openModal('create')" class="btn-create">Crear Comando</button>
        </div>
        
        <div class="switch-container">
            <span class="switch-label">Modo Edición</span>
            <label class="switch">
                <input type="checkbox" id="toggleEdit">
                <span class="slider"></span>
            </label>
            <button onclick="logout()" style="background: #27272a; color: #ef4444; margin-left: 15px; border: 1px solid #3f3f46;">
                Cerrar Sesión
            </button>
        </div>
    </header>

    <main>
        <div id="sidebar">
            <input type="text" id="searchBox" placeholder="Buscar comando... (Ctrl+K)">
            <div id="cmdList"></div>
        </div>
        <div class="content">
            <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h2 id="viewTitle" style="margin:0; color: white;">Selecciona un comando</h2>
                <div id="deleteZone" style="display:none; gap: 10px;">
                    <button id="btnEditCmd" style="background:#1e3a8a; color:#93c5fd;">Editar comando</button>
                    <button id="btnDelete" style="background:#7f1d1d; color:#fca5a5;">Eliminar permanentemente</button>
                </div>
            </div>
            <div class="code-box" id="viewCode" tabindex="0">Los detalles del comando aparecerán aquí...</div>
        </div>
    </main>

    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Nuevo Comando</h3>
                <button onclick="closeModal()" style="background:transparent; font-size: 24px; color:white; border:none; cursor:pointer;">&times;</button>
            </div>
            <form id="addForm" style="display:flex; flex: 1; flex-direction: column;">
                <input type="text" id="formNombre" placeholder="Nombre del exploit / comando" required>
                <div style="display: flex; gap: 10px;">
                    <select id="formTipo" style="flex: 1;"></select>
                    <select id="formOS" style="flex: 1;">
                        <option>Linux</option>
                        <option>Windows</option>
                        <option>Android</option>
                        <option>Web / General</option>
                    </select>
                </div>
                <textarea id="formComando" placeholder="Escribe el payload o comando aquí..." required></textarea>
                <div class="modal-footer">
                    <button type="button" class="btn-cancel" onclick="closeModal()">Cancelar</button>
                    <button type="submit" class="btn-save" id="btnSubmitForm">Guardar en Vault</button>
                </div>
            </form>
        </div>
    </div> 

    <div class="modal-overlay" id="confirmModal">
        <div class="modal-content" style="height: auto; width: 460px; max-width: 90%;">
            <div class="modal-header">
                <h3 style="font-size: 20px; color: white; margin: 0;">¿Confirmar eliminación?</h3>
            </div>
            <p id="confirmMessage" style="color: #a1a1aa; font-size: 14px; margin: 10px 0 25px 0; line-height: 1.5;"></p>
            <div class="modal-footer">
                <button type="button" class="btn-cancel" id="btnCancelDelete">Cancelar</button>
                <button type="button" style="background: var(--danger); color: white; padding: 0 20px;" id="btnConfirmDelete">Eliminar</button>
            </div>
        </div>
    </div>

    <script>
        const cats = ["Escaneo", "Fuzzing", "Explotacion", "Persistencia", "Inyeccion de Backdoor", "Exfiltracion", "Crontabs", "CVEs", "Scripts"];
        let data = [], activeCat = cats[0], selected = null, editMode = false;
        let modalMode = "create";

        // GESTIÓN DE CABECERAS CON TOKEN JWT
        function getHeaders() {
            const token = localStorage.getItem('vault_token');
            return {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}`
            };
        }

        // EVENTO DE LOGIN
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData();
            formData.append('username', document.getElementById('loginUser').value);
            formData.append('password', document.getElementById('loginPass').value);

            try {
                const res = await fetch('/api/login', { method: 'POST', body: formData });
                if (res.ok) {
                    const resData = await res.json();
                    localStorage.setItem('vault_token', resData.access_token);
                    document.getElementById('loginError').style.display = 'none';
                    document.getElementById('loginView').style.display = 'none';
                    load();
                } else {
                    document.getElementById('loginError').style.display = 'block';
                }
            } catch (err) {
                console.error("Error en la autenticación:", err);
            }
        };

        // Comprobación inicial estricta de sesión al arrancar la página
        if (!localStorage.getItem('vault_token')) {
            document.getElementById('loginView').style.display = 'flex';
        } else {
            document.getElementById('loginView').style.display = 'none';
            load();
        }

        const tabsContainer = document.getElementById('tabs');
        const formTipoSelect = document.getElementById('formTipo');
        
        cats.forEach(cat => {
            const btn = document.createElement('button');
            btn.textContent = cat;
            btn.className = (cat === activeCat) ? 'active' : '';
            btn.onclick = () => { 
                activeCat = cat; 
                resetView();
                document.getElementById('searchBox').value = ''; 
                document.querySelectorAll('#tabs button').forEach(b=>b.classList.remove('active')); 
                btn.classList.add('active'); 
                render(); 
            };
            tabsContainer.appendChild(btn);
            
            const opt = document.createElement('option');
            opt.value = cat;
            opt.textContent = cat;
            formTipoSelect.appendChild(opt);
        });

        async function load() { 
            if (!localStorage.getItem('vault_token')) return;
            try {
                const res = await fetch('/api/commands', { headers: getHeaders() }); 
                if (res.status === 401) { logout(); return; }
                
                data = await res.json(); 
                if (selected) {
                    selected = data.find(c => c.id === selected.id) || null;
                }
                render(); 
            } catch (err) {
                console.error("Error al cargar la base de datos:", err);
            }
        }

        // FUNCIÓN CERRAR SESIÓN (Limpia y bloquea la interfaz)
        function logout() {
            localStorage.removeItem('vault_token');
            resetView();
            document.getElementById('cmdList').innerHTML = '';
            document.getElementById('loginForm').reset();
            document.getElementById('loginView').style.display = 'flex';
        }

        function openModal(mode) { 
            modalMode = mode;
            const modalElement = document.getElementById('modal');
            const titleElement = document.getElementById('modalTitle');
            const submitBtn = document.getElementById('btnSubmitForm');
            
            if (mode === 'edit' && selected) {
                titleElement.innerText = "Editar Comando";
                submitBtn.innerText = "Actualizar en Vault";
                document.getElementById('formNombre').value = selected.nombre;
                document.getElementById('formTipo').value = selected.tipo;
                document.getElementById('formOS').value = selected.os;
                document.getElementById('formComando').value = selected.comando;
            } else {
                titleElement.innerText = "Nuevo Comando";
                submitBtn.innerText = "Guardar en Vault";
                document.getElementById('addForm').reset();
                document.getElementById('formTipo').value = activeCat;
            }
            modalElement.style.display = 'flex'; 
        }
        
        function closeModal() { 
            document.getElementById('modal').style.display = 'none'; 
            document.getElementById('addForm').reset(); 
        }

        function resetView() {
            selected = null;
            document.getElementById('viewTitle').innerText = 'Selecciona un comando';
            document.getElementById('viewCode').innerText = 'Los detalles del comando aparecerán aquí...';
            document.getElementById('deleteZone').style.display = 'none';
        }

        function render() {
            const list = document.getElementById('cmdList');
            list.innerHTML = '';
            const query = document.getElementById('searchBox').value.toLowerCase();
            const filtrados = data.filter(c =>
                c.tipo === activeCat &&
                (c.nombre.toLowerCase().includes(query) || c.comando.toLowerCase().includes(query))
            );
            filtrados.forEach(c => {
                const div = document.createElement('div');
                div.className = `cmd-item ${selected?.id === c.id ? 'selected' : ''}`;
                div.innerHTML = `<strong>${c.nombre}</strong><br><small style="color:#71717a">${c.os}</small>`;
                div.onclick = () => {
                    selected = c;
                    document.getElementById('viewTitle').innerText = c.nombre;
                    document.getElementById('viewCode').innerText = c.comando;
                    document.getElementById('deleteZone').style.display = editMode ? 'flex' : 'none';
                    render();
                };
                list.appendChild(div);
            });
        }

        document.getElementById('searchBox').oninput = () => { render(); };

        document.getElementById('addForm').onsubmit = async (e) => {
            e.preventDefault();
            const payload = {
                nombre: document.getElementById('formNombre').value,
                tipo: document.getElementById('formTipo').value,
                os: document.getElementById('formOS').value,
                comando: document.getElementById('formComando').value
            };
            if (modalMode === 'edit' && selected) {
                await fetch(`/api/commands/${selected.id}`, {
                    method: 'PUT',
                    headers: getHeaders(),
                    body: JSON.stringify(payload)
                });
                document.getElementById('viewTitle').innerText = payload.nombre;
                document.getElementById('viewCode').innerText = payload.comando;
                activeCat = payload.tipo;
                document.querySelectorAll('#tabs button').forEach(b => {
                    b.classList.toggle('active', b.textContent === activeCat);
                });
            } else {
                await fetch('/api/commands', {
                    method: 'POST',
                    headers: getHeaders(),
                    body: JSON.stringify(payload)
                });
                activeCat = payload.tipo;
                document.querySelectorAll('#tabs button').forEach(b => {
                    b.classList.toggle('active', b.textContent === activeCat);
                });
            }
            closeModal();
            await load();
        };

        document.getElementById('toggleEdit').onchange = (e) => {
            editMode = e.target.checked;
            document.getElementById('deleteZone').style.display = (editMode && selected) ? 'flex' : 'none';
            const label = document.querySelector('.switch-label');
            label.style.color = editMode ? 'white' : '#a1a1aa';
        };

        document.getElementById('btnEditCmd').onclick = () => { openModal('edit'); };

        document.getElementById('viewCode').onclick = () => {
            if(selected) {
                const box = document.getElementById('viewCode');
                box.style.borderColor = '#34d399';
                setTimeout(() => {
                    box.style.borderColor = '';
                }, 300);
            }
        };

        document.getElementById('btnDelete').onclick = () => {
            if (!selected) return;
            
            const confirmModal = document.getElementById('confirmModal');
            const confirmMessage = document.getElementById('confirmMessage');
            
            confirmMessage.innerHTML = `¿Estás seguro de que deseas eliminar permanentemente <strong>${selected.nombre}</strong>? Esta acción no se puede deshacer.`;
            confirmModal.style.display = 'flex';
            
            document.getElementById('btnCancelDelete').onclick = () => {
                confirmModal.style.display = 'none';
            };
            
            document.getElementById('btnConfirmDelete').onclick = async () => {
                confirmModal.style.display = 'none';
                await fetch(`/api/commands/${selected.id}`, { method: 'DELETE', headers: getHeaders() });
                resetView();
                await load();
            };
        };

        window.onkeydown = (e) => {
            if(e.ctrlKey && e.key === 'k') { e.preventDefault(); document.getElementById('searchBox').focus(); }
            if(e.key === 'Escape') {
                closeModal();
                document.getElementById('confirmModal').style.display = 'none';
            }
        };
    </script>
</body>
</html>
